<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市灵魂匹配指南 | Urban Soul Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-blue: #3b82f6;
            --light-blue: #60a5fa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto+Sans+SC', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f1f5f9;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .feature-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
        }

        .feature-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .glass-card {
                border-radius: 20px;
            }
            
            h1 {
                font-size: 2.5rem !important;
            }
            
            h2 {
                font-size: 1.5rem !important;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem !important;
            }
            
            h2 {
                font-size: 1.25rem !important;
            }
        }
    </style>
</head>
<body>
    <!-- Main Home Page -->
    <div id="home-page" class="min-h-screen flex flex-col">
        <!-- Hero Section -->
        <section class="flex-1 flex flex-col items-center justify-center px-4 py-16">
            <div class="max-w-4xl w-full">
                <div class="glass-card p-12 text-center fade-in">
                    <div class="mb-8 inline-block p-6 rounded-full bg-blue-600/20 text-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <h1 class="text-5xl font-bold mb-6 tracking-tight">城市灵魂匹配指南</h1>
                    <p class="text-slate-400 mb-10 leading-relaxed text-lg max-w-2xl mx-auto">通过深度的生活方式测试，发现最契合你灵魂底色的城市。我们分析你的价值观、偏好和生活态度，为你推荐最适合的城市。</p>
                    <button onclick="showRedeemCode()" class="pulse bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-full font-bold text-lg transition-all transform active:scale-95">
                        开始探索
                    </button>
                </div>
            </div>
        </section>

        <!-- Features Section -->
        <section class="py-16 px-4 bg-gradient-to-b from-transparent to-blue-900/20">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-center mb-12">产品特色</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <!-- Feature 1 -->
                    <div class="feature-card glass-card p-8 rounded-2xl fade-in" style="animation-delay: 0.1s">
                        <div class="text-blue-400 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold mb-3">深度测试</h3>
                        <p class="text-slate-400">15道精心设计的问题，从生活方式、价值观到感官偏好，全面分析你的居住人格。</p>
                    </div>

                    <!-- Feature 2 -->
                    <div class="feature-card glass-card p-8 rounded-2xl fade-in" style="animation-delay: 0.2s">
                        <div class="text-blue-400 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold mb-3">智能匹配</h3>
                        <p class="text-slate-400">基于你的回答，智能匹配最适合你的城市，提供个性化的推荐和分析。</p>
                    </div>

                    <!-- Feature 3 -->
                    <div class="feature-card glass-card p-8 rounded-2xl fade-in" style="animation-delay: 0.3s">
                        <div class="text-blue-400 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold mb-3">详细报告</h3>
                        <p class="text-slate-400">生成详细的匹配报告，包括城市推荐、人格分析和生活建议。</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Cities Section -->
        <section class="py-16 px-4">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-center mb-12">覆盖城市</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                    <div class="text-center fade-in" style="animation-delay: 0.1s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">上海</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.2s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">北京</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.3s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">成都</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.4s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">深圳</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.5s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">杭州</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.6s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">大理</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.7s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">厦门</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.8s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">重庆</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 0.9s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">广州</h4>
                        </div>
                    </div>
                    <div class="text-center fade-in" style="animation-delay: 1s">
                        <div class="glass-card p-4 rounded-xl">
                            <h4 class="font-medium">西安</h4>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-8 px-4 border-t border-white/10">
            <div class="max-w-6xl mx-auto text-center text-slate-500 text-sm">
                <p>© 2026 城市灵魂匹配指南 | Urban Soul Match</p>
            </div>
        </footer>
    </div>

    <!-- Redeem Code Modal -->
    <div id="redeem-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="glass-card p-8 max-w-md w-full mx-4 fade-in">
            <h2 class="text-2xl font-bold mb-6 text-center">输入兑换码</h2>
            <p class="text-slate-400 mb-6 text-center">请输入兑换码以访问完整功能</p>
            <div class="mb-6">
                <input type="text" id="redeem-code" placeholder="请输入兑换码" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:border-blue-500">
            </div>
            <div class="space-y-4">
                <button onclick="verifyCode()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all">
                    验证
                </button>
                <button onclick="hideRedeemCode()" class="w-full py-4 border border-white/10 hover:bg-white/5 text-white rounded-xl font-medium transition-all">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        function showRedeemCode() {
            document.getElementById('redeem-modal').classList.remove('hidden');
        }

        function hideRedeemCode() {
            document.getElementById('redeem-modal').classList.add('hidden');
        }

        function verifyCode() {
            const code = document.getElementById('redeem-code').value.trim();
            if (code === 'loubao') {
                // 验证成功，设置本地存储标记
                localStorage.setItem('redeemCodeVerified', 'true');
                // 跳转到测试页面
                window.location.href = 'test.html';
            } else {
                // 验证失败，显示错误信息
                alert('兑换码错误，请重新输入');
            }
        }

        // 监听回车键
        document.getElementById('redeem-code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCode();
            }
        });
    </script>
</body>
</html>
